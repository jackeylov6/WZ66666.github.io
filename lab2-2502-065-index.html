<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图书商城</title>
    <link rel="stylesheet" href="css\lab2-2502-065-index.css">
</head>
<body>
<header class="header">
    <div class="logo">
        <img src="img/logo.png" alt="Logo">
        图书商城
    </div>
    <nav class="top-nav">
        <a href="#">首页</a>
        <a href="#">图书分类</a>
        <a href="#">热门推荐</a>
        <a href="#">新书上市</a>
        <a href="#">关于我们</a>
    </nav>
</header>
<div class="container">
    <aside class="left-bar">
        <h2>图书分类</h2>
        <ul>
            <li>计算机图书</li>
            <li>文学小说</li>
            <li>历史传记</li>
            <li>少儿读物</li>
            <li>考试考证</li>
        </ul>
    </aside>
    <main class="middle-bar">
        <section class="book-show">
            <h2>图书展示</h2>
            <div class="book-item">
                <img src="img/book1.png" alt="图书1">
                <div>斗罗大陆1</div>
                <div class="book-tip">热销中</div>
                <div class="book-hover">点击查看详情</div>
            </div>
            <div class="book-item"><img src="img/book2.png" alt="图书2">
            <div>斗罗大陆2</div></div>
            <div class="book-item"><img src="img/book3.png" alt="图书3">
            <div>斗罗大陆3</div></div>
            <div class="book-item"><img src="img/book4.png" alt="图书4">
            <div>斗罗大陆4</div></div>
        </section>
        <section class="hot-book">
            <h2>热门推荐（网络小说早期四大名著）</h2>
            <div class="hot-item">小兵传奇</div>
            <div class="hot-item">飘渺之旅</div>
            <div class="hot-item">诛仙</div>
            <div class="hot-item">紫川</div>
        </section>
        <section class="new-book">
            <h2>新书上市</h2>
            <table border="1" cellpadding="8" cellspacing="0">
                <tr>
                    <th>书名</th>
                    <th>作者</th>
                    <th>价格</th>
                </tr>
                <tr>
                    <td>重生之我是faker</td>
                    <td>叶子的清清清清清</td>
                    <td>1元</td>
                </tr>
                <tr>
                    <td>从JackeyLove到吉神</td>
                    <td>失忆是诗意的失意</td>
                    <td>1元</td>
                </tr>
            </table>
        </section>
    </main>
    <aside class="right-bar">
        <h3>促销信息</h3>
        <p>满100减20</p>
        <p>新用户立减10元</p>
        <p>会员包邮</p>
    </aside>
</div>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const menuItems = document.querySelectorAll('.left-bar li');
        
        menuItems.forEach(item => {
            item.addEventListener('click', function() {

                menuItems.forEach(i => i.classList.remove('active'));

                this.classList.add('active');
            });
        });
    });
</script>
</body>
</html>
